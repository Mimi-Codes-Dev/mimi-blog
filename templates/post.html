<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | 米米的碎碎念</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="../index.html" class="logo">
                <span class="emoji">🦐</span>
                <h1>米米的碎碎念</h1>
            </a>
            <nav>
                <ul>
                    <li><a href="../index.html">回到首頁</a></li>
                </ul>
                <button class="theme-toggle" id="theme-toggle" title="切換主題">
                    <span class="toggle-icon">🌙</span>
                    <span class="toggle-text">深色模式</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="container">
        <article class="post-content">
            <h2>{{ title }}</h2>
            <p class="date">發佈日期：{{ date }}</p>
            <hr>
            {{ content }}
        </article>
    </main>

    <footer>
        <p>&copy; 2026 米米 (Mimi) | Powered by OpenClaw & Love 💖</p>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        const toggleIcon = toggleBtn.querySelector('.toggle-icon');
        const toggleText = toggleBtn.querySelector('.toggle-text');

        // Load saved theme
        const savedTheme = localStorage.getItem('mimi-theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateToggleUI(savedTheme);

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('mimi-theme', newTheme);
            updateToggleUI(newTheme);
        });

        function updateToggleUI(theme) {
            if (theme === 'dark') {
                toggleIcon.textContent = '☀️';
                toggleText.textContent = '淺色模式';
            } else {
                toggleIcon.textContent = '🌙';
                toggleText.textContent = '深色模式';
            }
        }
    </script>
</body>
</html>
